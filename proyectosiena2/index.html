  <body class="flex flex-col min-h-screen">
    <!-- Hero/Background Section with Shader -->
    <main
      class="flex-grow flex items-center justify-center relative overflow-hidden px-4 py-12"
    >
      <!-- Background Animation Layer -->
      <div class="absolute inset-0 z-0">
        <div
          class="absolute inset-0 bg-gradient-to-tr from-surface via-surface/80 to-primary-container/10"
        ></div>
      </div>
      <!-- Login Container -->
      <div class="relative z-10 w-full max-w-md">
        <div
          class="bg-surface-container-lowest p-8 md:p-12 border border-outline-variant rounded-xl shadow-xl"

          <!-- Brand Anchor -->
          <div class="flex flex-col items-center mb-8">
            <div class="mb-4">
              <span
                class="material-symbols-outlined text-primary text-5xl"
                style="font-variation-settings: &quot;FILL&quot; 1"
              >
                stream
              </span>
            </div>
            <h1
              class="font-headline-md text-headline-md font-black text-primary tracking-tight"
            >
              MarketStream
            </h1>
          </div>
          <!-- Welcome Text -->
          <div class="mb-8 text-center md:text-left">
            <h2
              class="font-headline-lg text-headline-lg font-bold text-on-surface"
            >
              Bienvenido de nuevo
            </h2>
            <p class="font-body-md text-body-md text-on-surface-variant mt-2">
              Accede a tu panel de control de comercio global.
            </p>
          </div>
          <!-- Form Section -->
          <form action="dashboard.html" method="POST">
            <!-- Email Input -->
            <div class="space-y-2">
              <label
                class="font-label-md text-label-md text-on-surface-variant ml-1"
                for="email"
                >Correo Electrónico</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
                >
                  mail
                </span>
                <input
                  class="w-full pl-11 pr-4 py-3 bg-surface rounded-lg border border-outline-variant focus:border-primary focus:ring-2 focus:ring-primary-container outline-none transition-all font-body-md text-body-md text-on-surface"
                  id="email"
                  placeholder="tu@empresa.com"
                  type="email"
                />
              </div>
            </div>
            <!-- Password Input -->
            <div class="space-y-2">
              <label
                class="font-label-md text-label-md text-on-surface-variant ml-1"
                for="password"
                >Contraseña</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors"
                >
                  lock
                </span>
                <input

                  id="password"
                  placeholder="••••••••"
                  type="password"
                />
                <button
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant transition-colors"
                  type="button"
                >
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
            </div>
            <!-- Form Helpers -->
            <div class="flex items-center justify-between">
              <label class="flex items-center cursor-pointer group">
                <input
                  class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary"
                  type="checkbox"
                />
                <span
                  class="ml-2 font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors"

                >
              </label>
              <a
                class="font-label-md text-label-md text-primary hover:underline transition-all"

              class="w-full py-4 bg-primary-container text-on-primary-container font-bold rounded-lg shadow-md hover:shadow-lg hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            >
              <span>Iniciar Sesión</span>
              <span class="material-symbols-outlined text-lg"
                >arrow_forward</span
              >
            </button>
          </form>
          <!-- Social Login Separator -->

            <button

                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqEnLUklKICChf70YAfwmetIrODRaKxYe3rvlNUGwIBeEihpPdsXNjNIiHcTE0VsRAQltaI_YdF2-qFfl8xzk4sY4dRzhfKi25JJQPyg2JW4hx8Yk8zVhsafdqVxwLG8yaMEJ-Ta5sRTYqJz6_dyY4Sp3EYTgne7eFktBrijigbN6VlrYLe5QLAaYua9LDenLKqSKRhc80zNF0Y_x2SmGaBWUYmwFXWr126F55ad5ekW4d-y3KqrZylOEh8bCqYgoIb1cB49pqiog"

              </div>
              <span class="font-label-md text-label-md text-on-surface"

              >
            </button>

          <!-- Sign Up Link -->
          <div class="mt-8 text-center">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
              ¿No tienes una cuenta?
              <a class="text-primary font-bold hover:underline ml-1" href="#"
                >Crear una cuenta</a
              >
            </p>
          </div>
        </div>
        <!-- Contextual Branding / Footer -->

          class="mt-8 flex justify-center space-x-6 text-on-surface-variant/60 font-label-md text-[12px] uppercase tracking-widest"
        >
          <a class="hover:text-primary transition-colors" href="#">Seguridad</a>
          <span>•</span>
          <a class="hover:text-primary transition-colors" href="#"
            >Privacidad</a
          >
          <span>•</span>
          <a class="hover:text-primary transition-colors" href="#">Ayuda</a>
        </div>
      </div>
      <!-- Decorative Illustration Element (Asymmetric Layout) -->
      <div
        class="hidden lg:block absolute right-[-5%] bottom-[-5%] w-[400px] h-[400px] opacity-20 pointer-events-none"
      >
        <div
          class="w-full h-full rounded-full border-[40px] border-primary-container/30 border-dashed animate-[spin_60s_linear_infinite]"

      </div>

    <!-- Simple Footer (Modified from JSON for Transactional Screen) -->
    <footer
      class="w-full py-base px-gutter border-t border-outline-variant bg-surface-container-low"
    >
      <div
        class="max-w-container-max mx-auto flex flex-col md:flex-row justify-between items-center text-on-surface-variant"
      >
        <span class="font-label-md text-label-md"
          >© 2024 MarketStream Systems Inc.</span
        >
        <div class="flex gap-4 mt-2 md:mt-0 font-label-md text-label-md">
          <a class="hover:text-primary transition-colors" href="#">Términos</a>
          <a class="hover:text-primary transition-colors" href="#">Global</a>
        </div>
      </div>
    </footer>

      // Simple input focus effects handled by Tailwind,
      // but adding a subtle border pulse animation on load
      window.addEventListener("DOMContentLoaded", () => {
        const loginCard = document.querySelector(
          ".bg-surface-container-lowest",
        );
        loginCard.style.opacity = "0";
        loginCard.style.transform = "translateY(20px)";

        setTimeout(() => {
          loginCard.style.transition = "all 0.6s cubic-bezier(0.16, 1, 0.3, 1)";
          loginCard.style.opacity = "1";
          loginCard.style.transform = "translateY(0)";
        }, 100);
      });
